name = "agent-chat-server"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "agent-chat"
database_id = "PLACEHOLDER"

[[durable_objects.bindings]]
name = "TOPIC_DO"
class_name = "TopicDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["TopicDurableObject"]

[vars]
PI_ADAPTER_URL = "wss://pi-adapter.jimmy-jam.com/api/agent-chat/v1/socket"
