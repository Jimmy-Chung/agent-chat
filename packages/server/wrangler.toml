name = "agent-chat-server"
main = "src/worker.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

[vars]
PI_ADAPTER_URL = "wss://pi-adapter.jimmy-jam.com/api/agent-chat/v1/socket"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "agent-chat"
database_id = "616c7032-f040-4178-8c04-6f5db71434a1"

[[r2_buckets]]
binding = "R2"
bucket_name = "agent-chat-artifacts"

[[durable_objects.bindings]]
name = "TOPIC_DO"
class_name = "TopicDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TopicDurableObject"]
