name = "agent-chat-server"
main = "src/worker.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

[vars]
AGENT_CHAT_TOKEN = "test-token"
# Attention 分析 LLM（AIT-220）。base_url / model 非敏感，可放这里；
# API key 用 secret 设置（不入库）：wrangler secret put ATTENTION_LLM_API_KEY
ATTENTION_LLM_BASE_URL = "https://api.deepseek.com/v1"
ATTENTION_LLM_MODEL = "deepseek-v4-pro"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "agent-chat"
database_id = "616c7032-f040-4178-8c04-6f5db71434a1"

[[r2_buckets]]
binding = "R2"
bucket_name = "agent-chat-artifacts"

[[durable_objects.bindings]]
name = "TOPIC_DO"
class_name = "TopicDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TopicDurableObject"]
