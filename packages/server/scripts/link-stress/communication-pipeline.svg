<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>.c-purple{fill:var(--bg2);stroke:var(--purple)}.c-teal{fill:var(--bg2);stroke:var(--teal)}.c-blue{fill:var(--bg2);stroke:var(--blue)}.c-gray{fill:var(--bg2);stroke:var(--gray)}.c-amber{fill:var(--bg2);stroke:var(--amber)}.arr{stroke:var(--b);stroke-width:1.5;fill:none;marker-end:url(#arrow)}.th{font-size:14px;font-weight:500;font-family:system-ui}.ts{font-size:12px;font-family:system-ui}.t{font-size:14px;font-family:system-ui}</style>

<!-- 标题 -->
<text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">前端 → Server → Adapter 通信链路</text>

<!-- 前端 -->
<g class="node c-purple" onclick="sendPrompt('前端如何建立 WebSocket 连接？')">
  <rect x="40" y="60" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="80" text-anchor="middle" dominant-baseline="central">前端</text>
  <text class="ts" x="180" y="100" text-anchor="middle" dominant-baseline="central">WebSocket Client</text>
</g>

<!-- Server -->
<g class="node c-teal" onclick="sendPrompt('Server 如何处理消息转发？')">
  <rect x="40" y="160" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="180" text-anchor="middle" dominant-baseline="central">Server (Wrangler)</text>
  <text class="ts" x="180" y="200" text-anchor="middle" dominant-baseline="central">消息转发 + Health Probe</text>
</g>

<!-- Relay -->
<g class="node c-gray" onclick="sendPrompt('Relay 如何处理原生 ping/pong？')">
  <rect x="40" y="260" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="280" text-anchor="middle" dominant-baseline="central">Relay (pi-relay.mjs)</text>
  <text class="ts" x="180" y="300" text-anchor="middle" dominant-baseline="central">HTTPS_PROXY → CF Tunnel</text>
</g>

<!-- Adapter -->
<g class="node c-blue" onclick="sendPrompt('Adapter 的 keepalive 机制是什么？')">
  <rect x="40" y="360" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="380" text-anchor="middle" dominant-baseline="central">PI Adapter</text>
  <text class="ts" x="180" y="400" text-anchor="middle" dominant-baseline="central">Claude Code CLI 调用</text>
</g>

<!-- 箭头：前端 → Server -->
<line x1="180" y1="116" x2="180" y2="160" class="arr"/>
<text class="ts" x="195" y="138" dominant-baseline="central">ws://server/ws</text>

<!-- 箭头：Server → Relay -->
<line x1="180" y1="216" x2="180" y2="260" class="arr"/>
<text class="ts" x="195" y="238" dominant-baseline="central">内部转发</text>

<!-- 箭头：Relay → Adapter -->
<line x1="180" y1="316" x2="180" y2="360" class="arr"/>
<text class="ts" x="195" y="338" dominant-baseline="central">HTTPS_PROXY</text>

<!-- 保活机制区域 -->
<g class="c-amber">
  <rect x="360" y="60" width="280" height="180" rx="8" stroke-width="0.5"/>
  <text class="th" x="500" y="80" text-anchor="middle" dominant-baseline="central">保活机制 (Keepalive)</text>
</g>

<!-- Keepalive 流程 -->
<g class="c-teal">
  <rect x="380" y="100" width="240" height="40" rx="6" stroke-width="0.5"/>
  <text class="ts" x="500" y="120" text-anchor="middle" dominant-baseline="central">1. Adapter 发送 {v:1, t:"keepalive"}</text>
</g>
<g class="c-purple">
  <rect x="380" y="150" width="240" height="40" rx="6" stroke-width="0.5"/>
  <text class="ts" x="500" y="170" text-anchor="middle" dominant-baseline="central">2. Client 收到 → 回复 keepalive_ack</text>
</g>
<g class="c-blue">
  <rect x="380" y="200" width="240" height="30" rx="6" stroke-width="0.5"/>
  <text class="ts" x="500" y="215" text-anchor="middle" dominant-baseline="central">3. Adapter 设置 isAlive=true ✓</text>
</g>

<!-- 问题区域 -->
<g class="c-gray">
  <rect x="360" y="260" width="280" height="156" rx="8" stroke-width="0.5"/>
  <text class="th" x="500" y="280" text-anchor="middle" dominant-baseline="central">已知问题</text>
  <text class="ts" x="380" y="300" dominant-baseline="central">• 原生 ping/pong 被 CF Tunnel 过滤</text>
  <text class="ts" x="380" y="320" dominant-baseline="central">• Relay 不转发原生帧</text>
  <text class="ts" x="380" y="340" dominant-baseline="central">• Quick Tunnel 上行数据帧被过滤</text>
  <text class="ts" x="380" y="360" dominant-baseline="central">• Named Tunnel 需验证</text>
  <text class="ts" x="380" y="380" dominant-baseline="central">• Tailscale 方案待评估</text>
</g>

<!-- 消息类型说明 -->
<g class="c-gray">
  <rect x="40" y="440" width="600" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="456" text-anchor="middle" dominant-baseline="central">消息帧格式</text>
  <text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central">RPC: {v:1, t:"rpc", d:{method, params}} | Event: {v:1, t:"event", d:{payload}} | Keepalive: {v:1, t:"keepalive"}</text>
</g>

</svg>