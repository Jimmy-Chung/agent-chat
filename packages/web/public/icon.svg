<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img" aria-label="Helm">
  <defs>
    <radialGradient id="helmBg" cx="30%" cy="18%" r="120%">
      <stop offset="0%" stop-color="#3AA0FF"/>
      <stop offset="42%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0050C8"/>
    </radialGradient>
  </defs>
  <!-- full-bleed background so OS maskable cropping keeps the blue field -->
  <rect width="100" height="100" fill="url(#helmBg)"/>
  <!-- helm mark, scaled into the maskable safe zone and centered -->
  <g transform="translate(50 50) scale(0.6) translate(-50 -50)" fill="none">
    <g stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round">
      <line x1="50" y1="50" x2="50" y2="20"/>
      <line x1="50" y1="50" x2="75.98" y2="35"/>
      <line x1="50" y1="50" x2="75.98" y2="65"/>
      <line x1="50" y1="50" x2="50" y2="80"/>
      <line x1="50" y1="50" x2="24.02" y2="65"/>
      <line x1="50" y1="50" x2="24.02" y2="35"/>
    </g>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#FFFFFF" stroke-width="7"/>
    <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round">
      <line x1="50" y1="20" x2="50" y2="9"/>
      <line x1="75.98" y1="35" x2="85.5" y2="29.5"/>
      <line x1="75.98" y1="65" x2="85.5" y2="70.5"/>
      <line x1="50" y1="80" x2="50" y2="91"/>
      <line x1="24.02" y1="65" x2="14.5" y2="70.5"/>
      <line x1="24.02" y1="35" x2="14.5" y2="29.5"/>
    </g>
    <circle cx="50" cy="50" r="11" fill="#FFFFFF"/>
    <line x1="50" y1="20" x2="50" y2="9" stroke="#FFD98A" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
