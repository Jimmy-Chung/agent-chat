name: Deploy Pages to Cloudflare

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

jobs:
  deploy-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js
        run: pnpm -F web build
      - name: Create Pages project (if not exists)
        run: npx wrangler@latest pages project create agent-chat --production-branch master || true
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy packages/web/out --project-name agent-chat --branch master --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3eb98f2d565b81debeed1ef19b76d5f4
