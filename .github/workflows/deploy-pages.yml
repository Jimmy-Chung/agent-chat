name: Deploy Pages to Cloudflare

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

jobs:
  deploy-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js
        run: pnpm -F web build
      - name: Create Pages project via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: 3eb98f2d565b81debeed1ef19b76d5f4
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"agent-chat","production_branch":"master"}' \
            | grep -q '"success":true\|"code":8000010' && echo "Project ready"
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy packages/web/out --project-name agent-chat --branch master --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3eb98f2d565b81debeed1ef19b76d5f4
